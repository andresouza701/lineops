services:
  db:
    image: postgres:15.8
    container_name: lineops-db
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USER:-lineops}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD not set}
      POSTGRES_DB: ${DB_NAME:-lineops}
    ports:
      - "5433:5432"
    volumes:
      - lineops_postgres_data:/var/lib/postgresql/data

  web:
    build: .
    container_name: lineops-app
    command: python -m gunicorn config.wsgi:application --bind 0.0.0.0:8000 --timeout 120 --keep-alive 5 --workers 4 --threads 2
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - db  
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-config.settings_dev}
volumes:
  lineops_postgres_data:
    name: lineops_postgres_data
