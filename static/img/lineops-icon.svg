<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 38 38" fill="none">
  <defs>
    <linearGradient id="icon-bg" x1="0" y1="0" x2="38" y2="38" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1e40af"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="icon-letter" x1="10" y1="8" x2="28" y2="30" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#93c5fd"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="icon-signal" x1="22" y1="8" x2="32" y2="16" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#60a5fa" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#93c5fd" stop-opacity="0.5"/>
    </linearGradient>
  </defs>

  <!-- Rounded square base -->
  <rect width="38" height="38" rx="12" fill="url(#icon-bg)"/>

  <!-- "L" letterform -->
  <path d="
    M 10.5 8
    L 10.5 26
    L 10.5 29
    L 26.5 29
    L 26.5 25.2
    L 14.8 25.2
    L 14.8 8
    Z
  " fill="url(#icon-letter)"/>

  <!-- Signal arcs -->
  <path d="M 22.5 14.5 A 4 4 0 0 1 26.5 10.5" stroke="url(#icon-signal)" stroke-width="1.8" stroke-linecap="round" fill="none"/>
  <path d="M 22.5 14.5 A 8 8 0 0 1 30.5 6.5" stroke="url(#icon-signal)" stroke-width="1.4" stroke-linecap="round" fill="none" opacity="0.6"/>

  <!-- Connection dot -->
  <circle cx="22.5" cy="14.5" r="1.5" fill="#93c5fd"/>
  <circle cx="22.5" cy="14.5" r="0.7" fill="#ffffff"/>
</svg>
