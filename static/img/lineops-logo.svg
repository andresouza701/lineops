<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1e40af"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="accent-grad" x1="140" y1="120" x2="380" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#93c5fd"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="signal-grad" x1="300" y1="100" x2="420" y2="220" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#60a5fa" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#93c5fd" stop-opacity="0.5"/>
    </linearGradient>
  </defs>

  <!-- Base shape — rounded square -->
  <rect x="16" y="16" width="480" height="480" rx="96" fill="url(#bg-grad)"/>

  <!-- Subtle inner glow -->
  <rect x="16" y="16" width="480" height="480" rx="96" fill="none" stroke="rgba(147,197,253,0.15)" stroke-width="2"/>

  <!-- "L" letterform — bold, geometric -->
  <path d="
    M 152 120
    L 152 352
    L 152 392
    L 360 392
    L 360 340
    L 208 340
    L 208 120
    Z
  " fill="url(#accent-grad)"/>

  <!-- Signal arcs — top right, representing connectivity -->
  <path d="M 310 195 A 55 55 0 0 1 365 140" stroke="url(#signal-grad)" stroke-width="22" stroke-linecap="round" fill="none"/>
  <path d="M 310 195 A 110 110 0 0 1 420 85" stroke="url(#signal-grad)" stroke-width="18" stroke-linecap="round" fill="none" opacity="0.65"/>
  <path d="M 310 195 A 165 165 0 0 1 475 30" stroke="url(#signal-grad)" stroke-width="14" stroke-linecap="round" fill="none" opacity="0.35"/>

  <!-- Connection dot at signal origin -->
  <circle cx="310" cy="195" r="16" fill="#93c5fd"/>
  <circle cx="310" cy="195" r="8" fill="#ffffff"/>
</svg>
