{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>LineOps</title>
    <link rel="icon" type="image/svg+xml" href="{% static 'img/lineops-icon.svg' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>
<body class="auth-background">
    <main class="d-flex min-vh-100 align-items-center justify-content-center px-3">
        <div class="w-100" style="max-width: 480px;">
            <div class="text-center mb-4">
                <img src="{% static 'img/lineops-logo.svg' %}" alt="LineOps" width="72" height="72" class="auth-logo">
                <h1 class="auth-brand-title">LineOps</h1>
            </div>
            {% include "base/messages.html" %}
            {% block content %}{% endblock %}
            <p class="text-center text-white-50 mt-4" style="font-size: 0.9rem;">
                LineOps · Gerenciamento de Whatsapp e usuários · &copy; {% now "Y" %}
            </p>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
